<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Trực Điện/CI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50">
    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white py-6 shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-4xl font-bold">Lịch Trực Điện/CI</h1>
            <p class="text-blue-100 text-sm mt-1">Lịch trực ca cho team C&I - Điện TSC Đông Nam Bộ</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Trong Ca Trực -->
        <section id="current-shift" class="bg-white rounded-lg shadow-md p-6 mb-6 border-l-4 border-red-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">🔴 Trong Ca Trực</h2>
            <div id="current-shift-info" class="text-lg text-gray-700"></div>
        </section>

        <!-- Lịch Trực Theo Ngày -->
        <section id="day-view" class="bg-white rounded-lg shadow-md p-6 mb-6 border-l-4 border-green-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">📅 Lịch Trực Theo Ngày</h2>
            <div class="flex gap-3 mb-4">
                <input type="date" id="date-picker" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                <button id="view-day-button" class="hidden px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">Xem Lịch</button>
            </div>
            <div id="selected-date-display" class="text-sm text-green-700 font-semibold mb-3"></div>
            <div id="day-schedule" class="bg-gray-50 p-4 rounded-lg border border-gray-200"></div>
        </section>

        <!-- Lịch Trực Theo Tuần -->
        <section id="week-view" class="bg-white rounded-lg shadow-md p-6 mb-6 border-l-4 border-blue-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">📊 Lịch Trực Tuần</h2>
            <div class="mb-4">
                <label for="person-search" class="block text-sm font-semibold text-gray-700 mb-2">Tìm kiếm nhân viên:</label>
                <div class="relative">
                    <input type="text" id="person-search" placeholder="Gõ tên nhân viên để tìm kiếm..." 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <div id="person-dropdown" class="absolute top-full left-0 right-0 mt-2 bg-white border border-gray-300 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden z-50"></div>
                </div>
            </div>
            <input type="hidden" id="person-select" value="">
            <div id="selected-person" class="mb-4 px-3 py-2 bg-blue-100 text-blue-800 rounded-lg font-semibold hidden"></div>
            <div id="week-schedule" class="bg-gray-50 p-4 rounded-lg border border-gray-200"></div>
        </section>

        <!-- Lịch Trực Theo Tháng -->
        <section id="month-view" class="bg-white rounded-lg shadow-md p-6 border-l-4 border-purple-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">📆 Lịch Trực Tháng</h2>
            <div id="month-schedule" class="bg-gray-50 p-4 rounded-lg border border-gray-200"></div>
        </section>
    </main>

    <footer class="bg-gray-800 text-white py-4 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            &copy; 2026 Lịch Trực Điện/CI. All rights reserved.
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
